<!DOCTYPE html>
<html>
<head>
    <title>Volunteer List</title>
</head>
<body>

<h1>Registered Volunteers</h1>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
