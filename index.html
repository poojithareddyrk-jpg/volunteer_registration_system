<!DOCTYPE html>
<html>
<head>
    <title>NayePankh Volunteer Registration</title>

    <style>
        body{
            background-color:#e8f5e9;
            font-family:Arial;
            text-align:center;
            padding-top:50px;
        }

        .container{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:green;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
        }

        button{
            background-color:green;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;
        }

        button:hover{
            background-color:darkgreen;
        }
    </style>

</head>

<body>

<div class="container">

<h1>NayePankh Foundation</h1>

<h2>Volunteer Registration System</h2>

<form method="POST">

    <input type="text" name="name" placeholder="Enter Name"><br>

    <input type="email" name="email" placeholder="Enter Email"><br>

    <input type="text" name="phone" placeholder="Enter Phone"><br>

    <button type="submit">Register</button>

    <br><br>

    <a href="/volunteers">
    <button type="button">View Volunteers</button>
    </a>

    <br><br>

    <a href="/report">
    <button type="button">Generate Report</button>
    </a>

</form>

</div>

</body>
</html>
